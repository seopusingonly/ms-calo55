<html amp lang="id">
<head>
  <meta charset="utf-8">

  <meta name="viewport" content="width=device-width,minimum-scale=1,initial-scale=1">
  <style amp-boilerplate>body{-webkit-animation:-amp-start 8s steps(1,end) 0s 1 normal both;-moz-animation:-amp-start 8s steps(1,end) 0s 1 normal both;-ms-animation:-amp-start 8s steps(1,end) 0s 1 normal both;animation:-amp-start 8s steps(1,end) 0s 1 normal both}@-webkit-keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}@-moz-keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}@-ms-keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}@-o-keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}@keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}</style><noscript><style amp-boilerplate>body{-webkit-animation:none;-moz-animation:none;-ms-animation:none;animation:none}</style></noscript>
  <style amp-custom>
    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
      margin: 0; 
      padding: 0; 
      background-color: #fff; 
      color: #000; 
    }
    header { 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      padding: 12px 16px; 
      position: sticky; 
      top: 0; 
      background: #fff; 
      z-index: 10; 
    }
    .logo { 
      color: GOLD; 
      font-weight: 700; 
      font-size: 20px; 
      display: flex; 
      align-items: center; 
      text-decoration: none; 
      letter-spacing: -0.5px;
    }
    
    .main-img-wrap { 
      position: relative; 
      width: 100%;
    }
    .img-overlay-btn { 
      position: absolute; 
      background: rgba(255,255,255,0.9); 
      border-radius: 50%; 
      width: 36px; 
      height: 36px; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      cursor: pointer; 
    }
    .img-overlay-btn svg { width: 20px; height: 20px; fill: #000; }
    .img-overlay-btn.top-right { top: 16px; right: 16px; }
    .img-overlay-btn.bottom-right { bottom: 16px; right: 16px; }
    
    .card-content { padding: 16px; }
    .card-title { 
      font-size: 24px; 
      font-weight: 700; 
      margin: 0 0 8px 0; 
      line-height: 1.2; 
      white-space: nowrap; 
      overflow: hidden; 
      text-overflow: ellipsis; 
    }
    .card-title a { text-decoration: none; color: inherit; }

    /* Deskripsi Expandable */
    .toggle-desc { display: none; }
    .card-desc { 
      display: -webkit-box; 
      -webkit-line-clamp: 1; 
      -webkit-box-orient: vertical; 
      overflow: hidden; 
      font-size: 16px; 
      color: #000; 
      margin: 0; 
      line-height: 1.4; 
    }
    .toggle-desc:checked ~ .card-desc { -webkit-line-clamp: unset; }
    .toggle-label { font-weight: 700; cursor: pointer; font-size: 16px; display: inline-block; margin-top: 2px;}
    .toggle-desc:not(:checked) ~ .toggle-label::after { content: "... more"; }
    .toggle-desc:checked ~ .toggle-label::after { content: "less"; }
    
    .action-bar { 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      margin-top: 24px; 
    }
    .action-center { display: flex; gap: 8px; flex: 1; justify-content: center; }
    .icon-btn { 
      background: none; 
      border: none; 
      cursor: pointer; 
      padding: 8px; 
      display: flex; 
      align-items: center; 
      justify-content: center;
    }
    .icon-btn svg { width: 24px; height: 24px; fill: #000; }
    .icon-btn.share-icon svg { fill: none; stroke: #000; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    
    .btn-visit { background: BLUE; color: #fff; padding: 12px 20px; border-radius: 24px; font-weight: 600; text-decoration: none; font-size: 15px;}
    .btn-save { background: GOLD; color: #000; padding: 12px 20px; border-radius: 24px; font-weight: 600; text-decoration: none; font-size: 15px;}
    
    .more-section { padding: 16px; }
    .more-title { font-size: 18px; font-weight: 700; margin: 0 0 16px 0; text-align: left;}
    
    .masonry { 
      column-count: 2; 
      column-gap: 12px; 
    }
    .masonry-item { 
      break-inside: avoid; 
      margin-bottom: 12px; 
      position: relative; 
    }
    .masonry-item amp-img { border-radius: 12px; }
    .badge { 
      position: absolute; 
      top: 8px; 
      left: 8px; 
      background: rgba(255,255,255,0.9); 
      padding: 4px 8px; 
      border-radius: 12px; 
      font-size: 12px; 
      font-weight: 600; 
      z-index: 1;
    }
    .pin-overlay-icon { 
      position: absolute; 
      bottom: 8px; 
      right: 8px; 
      background: rgba(255,255,255,0.8); 
      width: 28px; 
      height: 28px; 
      border-radius: 50%; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      z-index: 1;
    }
    .pin-overlay-icon svg { width: 14px; height: 14px; fill: #000; transform: rotate(45deg); }
    .item-caption { 
      padding: 4px 0; 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
    }
    .item-text { 
      font-size: 14px; 
      font-weight: 600; 
      white-space: nowrap; 
      overflow: hidden; 
      text-overflow: ellipsis; 
      max-width: 80%;
    }
    .item-dots svg { width: 18px; height: 18px; fill: #000; }
    
    footer {
      text-align: center;
      padding: 20px;
      font-size: 14px;
      color: #000;
      font-weight: 600;
    }
  </style>
</head>
<body>

        </div>
        <button class="icon-btn share-icon">

    <div class="more-section">

      <div class="masonry">
        
        <div class="masonry-item">

          </div>
          <div class="item-caption">
            <span class="item-text">Explore more...</span>
            <span class="item-dots"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="2.5"/><circle cx="20" cy="12" r="2.5"/><circle cx="4" cy="12" r="2.5"/></svg></span>
          </div>
        </div>

        <div class="masonry-item">
          <amp-img src="https://picsum.photos/400/650" width="400" height="650" layout="responsive" alt="Explore 2"></amp-img>
          <div class="pin-overlay-icon">
            <svg viewBox="0 0 24 24"><path d="M16 12V4h1V2H7v2h1v8l-2 2v2h5.2v6h1.6v-6H18v-2l-2-2z"/></svg>
          </div>
        </div>

        <div class="masonry-item">
          <amp-img src="https://picsum.photos/400/300" width="400" height="300" layout="responsive" alt="Explore 3"></amp-img>
        </div>

      </div>
    </div>
  </main>
  
  <footer>© Copyright 2026 All Rights Reserved. CALO55</footer>
